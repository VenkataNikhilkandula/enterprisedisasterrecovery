spring.application.name=disaster-recovery

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_recovery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Custom Application Properties
app.primary.storage.path=C:/primary_storage/
app.backup.storage.path=C:/backup_storage/
app.backup.mysql.dump.cmd=mysqldump
app.backup.mysql.restore.cmd=mysql